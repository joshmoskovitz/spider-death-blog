# Fly.io configuration for Spider Death Blog API
# Deploy with: fly deploy
# Set secrets with: fly secrets set ANTHROPIC_API_KEY=sk-ant-...

app = "spider-death-api"
primary_region = "iad"

[build]

[env]
  PORT = "8888"
  CORS_ORIGINS = "https://spiderdeath.blog,https://spider-death-blog.pages.dev"

[http_service]
  internal_port = 8888
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[mounts]
  source = "spider_data"
  destination = "/app/data"
  initial_size = "1"
